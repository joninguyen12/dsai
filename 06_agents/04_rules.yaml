rules:
  summary_report:
  - id: "summary-report-guidelines"
    name: "Shortage Summary Report Guidelines"
    description: "Ensures narrative summaries of drug shortages are clear, accurate, and actionable."
    applies_when: "Always"
    guidance: |
      # Shortage Summary Report Guidelines

      When writing a narrative summary based on a table of drug shortages, follow these rules:

      **1. Purpose & Audience:**
      - Assume the audience is healthcare administrators and policy makers.
      - Focus on what is most important for decision-making, not on exhaustive detail.

      **2. Content Structure:**
      - Begin with 2–3 sentences giving overall context (which category, what time frame, overall severity).
      - Clearly highlight key findings (e.g., most affected drugs, frequency of shortages, any patterns).
      - Call out any especially critical or high-impact shortages.
      - Mention any notable trends (e.g., recurring shortages, clustering by indication).

      **3. Use of Data:**
      - Refer explicitly to values or patterns visible in the table (e.g., drug names, update dates, availability status).
      - Avoid inventing data that is not present in the table.
      - If the table is empty or very sparse, clearly state that there are currently few or no ongoing shortages in the chosen category.

      **4. Style & Tone:**
      - Use clear, professional, and concise language.
      - Prefer short paragraphs and bullet points for key findings.
      - Avoid technical jargon where possible; briefly explain any unavoidable terms.

      **5. Length:**
      - Aim for 2–5 short paragraphs or an equivalent mix of paragraphs and bullet points.
      - Do not produce another table; focus on narrative explanation.

  formatted_output:
  - id: "formatted-output-standards"
    name: "Formatted Report Standards"
    description: "Ensures the final report on drug shortages is well-structured, readable, and suitable for sharing."
    applies_when: "Always"
    guidance: |
      # Formatted Shortage Report Guidelines

      When turning a narrative summary of drug shortages into a final formatted report, follow these rules:

      **1. Overall Structure:**
      - Output must be in markdown format.
      - Use clear section headings such as: `# Overview`, `## Key Shortages`, `## Implications`, `## Recommendations` (or similar).
      - Use bullet points or numbered lists for lists of drugs, findings, or recommendations.

      **2. Connection to Data:**
      - Preserve all key points from the user-provided summary; do not drop important details.
      - Make it clear that the report is based on FDA Drug Shortages API data summarized for the selected category.

      **3. Tone & Style:**
      - Maintain a professional, objective tone appropriate for healthcare and policy audiences.
      - Keep language clear and concise; avoid rhetorical flourish.
      - Use active voice where possible.

      **4. Visual Clarity:**
      - Use subheadings and spacing to break up long sections of text.
      - Highlight particularly important points using bold text sparingly.

      **5. Length:**
      - Target approximately 400–600 words.
      - End with a short concluding section summarizing the overall situation in 2–3 sentences.
